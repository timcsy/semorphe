<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Blockly - 程式碼與積木雙向轉換</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <h1>Code Blockly</h1>
        <div class="toolbar-actions">
          <button id="blocks-to-code-btn" title="積木 → 程式碼">積木→程式碼</button>
          <button id="code-to-blocks-btn" title="程式碼 → 積木">程式碼→積木</button>
          <span class="toolbar-separator"></span>
          <button id="undo-btn" title="復原">↩</button>
          <button id="redo-btn" title="重做">↪</button>
          <span class="toolbar-separator"></span>
          <button id="clear-workspace-btn" title="清空所有積木">清空</button>
          <button id="toolbox-toggle-btn" title="切換工具箱模式" data-level="beginner">初級模式</button>
          <select id="style-selector" title="編碼風格"></select>
          <span class="toolbar-separator"></span>
          <button id="run-btn" class="run-btn" title="執行程式">▶ 執行</button>
          <span id="exec-controls" class="exec-controls hidden">
            <button id="step-btn" class="step-btn" title="逐步執行">⏭ 逐步</button>
            <button id="pause-btn" class="pause-btn" title="暫停/繼續" disabled>⏸ 暫停</button>
            <button id="stop-btn" class="stop-btn" title="停止執行">■ 停止</button>
            <select id="speed-selector" title="執行速度">
              <option value="slow">慢速</option>
              <option value="medium" selected>中速</option>
              <option value="fast">快速</option>
            </select>
          </span>
          <span class="toolbar-separator"></span>
          <button id="upload-blocks-btn" title="上傳自訂積木定義">上傳積木</button>
          <input type="file" id="blocks-file-input" accept=".json" hidden />
          <button id="export-btn" title="匯出工作內容">匯出</button>
          <button id="import-btn" title="匯入工作內容">匯入</button>
          <input type="file" id="import-file-input" accept=".json" hidden />
        </div>
      </header>
      <main id="editors">
        <div id="blockly-panel">
          <div id="quick-access-bar"></div>
          <div id="blockly-editor"></div>
        </div>
        <div id="divider"></div>
        <div id="code-panel">
          <div id="code-editor"></div>
          <div id="variable-panel"></div>
          <div id="console-panel"></div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
